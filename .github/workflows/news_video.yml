name: MindBlownFacts Video Pipeline

on:
  schedule:
    # ── Video uploads: 3 Shorts/day + 1 standard/day ───────────────────────────
    # (PKT = UTC+5, IST = UTC+5:30)
    - cron: '0 3 * * *'   # 03:00 UTC │ 8:00 AM PKT │ SHORTS  — Asia morning scroll peak
    - cron: '0 8 * * *'   # 08:00 UTC │ 1:00 PM PKT │ STANDARD — UK morning + Asia lunch peak
    - cron: '0 13 * * *'  # 13:00 UTC │ 6:00 PM PKT │ SHORTS  — US morning + Asia evening PEAK
    - cron: '0 21 * * *'  # 21:00 UTC │ 2:00 AM PKT │ SHORTS  — US after-work PEAK (highest US traffic)
    # ── Background tasks — always running ──────────────────────────────────────
    - cron: '0 * * * *'    # Every hour — comment auto-responder + news monitor
  workflow_dispatch:
    inputs:
      intent_override:
        description: 'Force category (SPACE/SCIENCE/HISTORY/ANIMALS/NATURE/GEOGRAPHY/OCEAN/CULTURE/TECHNOLOGY/PSYCHOLOGY/MYTHOLOGY/MEDICINE/MATHEMATICS/ECONOMICS/PHYSICS)'
        required: false
        default: ''
      video_format:
        description: 'Video format: shorts | standard | long'
        required: false
        default: 'shorts'

jobs:
  news-video:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 3 * * *'  ||
      github.event.schedule == '0 8 * * *'  ||
      github.event.schedule == '0 13 * * *' ||
      github.event.schedule == '0 21 * * *'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation libass-dev
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install requests gtts edge-tts rapidfuzz Pillow pytrends

      - name: Create runtime directories
        run: |
          mkdir -p pipeline/temp/voice     \
                   pipeline/temp/visuals   \
                   pipeline/temp/subtitles \
                   pipeline/temp/scenes    \
                   pipeline/output         \
                   pipeline/logs

      - name: Resolve video format
        id: fmt
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "format=${{ github.event.inputs.video_format || 'shorts' }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 8 * * *" ]; then
            # 08:00 UTC daily = standard/long video with landscape video clips
            echo "format=standard" >> $GITHUB_OUTPUT
          else
            # 03:00, 13:00, 21:00 UTC = Shorts with portrait video clips
            echo "format=shorts" >> $GITHUB_OUTPUT
          fi

      - name: Run Video Pipeline
        env:
          VIDEO_FORMAT:          ${{ steps.fmt.outputs.format }}
          INTENT_OVERRIDE:       ${{ github.event.inputs.intent_override }}
          GROQ_API_KEY_1:        ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2:        ${{ secrets.GROQ_API_KEY_2 }}
          ELEVENLABS_API_KEY:    ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_API_KEY_2:  ${{ secrets.ELEVENLABS_API_KEY_2 }}
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:       ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_API_KEY:       ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GMAIL_SENDER:            ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD:      ${{ secrets.GMAIL_APP_PASSWORD }}
          HUGGINGFACE_API_KEY_1:   ${{ secrets.HUGGINGFACE_API_KEY_1 }}
          HUGGINGFACE_API_KEY_2:   ${{ secrets.HUGGINGFACE_API_KEY_2 }}
          HUGGINGFACE_API_KEY_3:   ${{ secrets.HUGGINGFACE_API_KEY_3 }}
          HUGGINGFACE_API_KEY_4:   ${{ secrets.HUGGINGFACE_API_KEY_4 }}
          HUGGINGFACE_API_KEY_5:   ${{ secrets.HUGGINGFACE_API_KEY_5 }}
        run: |
          echo "=== MindBlownFacts Video Pipeline — format=$VIDEO_FORMAT ==="
          python pipeline/main.py
          echo ""
          echo "=== Output files ==="
          ls -lh pipeline/output/ 2>/dev/null || echo "(no output files)"

      - name: Save logs to repository
        if: always()
        continue-on-error: true
        run: |
          git config user.name  "VisionaryMinds Bot"
          git config user.email "bot@visionaryminds.com"
          git add pipeline/logs/ 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "bot: update pipeline logs [skip ci]"
          git push 2>/dev/null || true

  # ── News monitor (runs every hour — saves trigger + fires bonus video) ───────
  news-monitor:
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: write   # needed to dispatch bonus video workflow

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests

      - name: Check trending news
        id: monitor
        continue-on-error: true
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
        run: |
          mkdir -p pipeline/logs
          python -c "
          import sys, json
          from pathlib import Path
          sys.path.insert(0, 'pipeline/scripts')
          from news_monitor import run_news_monitor
          triggered = run_news_monitor()
          print('Triggered:', triggered)
          # Output trigger score for next step
          tp = Path('pipeline/logs/news_trigger.json')
          if tp.exists():
              d = json.loads(tp.read_text())
              score = d.get('topic', {}).get('news_score', 0)
              used  = d.get('used', False)
              print(f'TRIGGER_SCORE={score}')
              print(f'TRIGGER_USED={used}')
              import os; out = os.environ.get('GITHUB_OUTPUT','')
              with open(out, 'a') as f:
                  f.write(f'trigger_score={score}\n')
                  f.write(f'trigger_used={used}\n')
          "

      - name: Save news trigger and queue
        continue-on-error: true
        run: |
          git config user.name  "VisionaryMinds Bot"
          git config user.email "bot@visionaryminds.com"
          git add pipeline/logs/news_trigger.json \
                  pipeline/logs/news_queue.json 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "bot: news trigger [skip ci]"
          git push 2>/dev/null || true

      - name: Dispatch bonus video upload
        # Fire an extra pipeline run when news score ≥ 70 and not yet used today
        if: |
          steps.monitor.outputs.trigger_score != '' &&
          fromJSON(steps.monitor.outputs.trigger_score) >= 70 &&
          steps.monitor.outputs.trigger_used == 'False'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "High-value news trigger (score=${{ steps.monitor.outputs.trigger_score }}) — dispatching bonus standard video"
          gh workflow run news_video.yml \
            --ref main \
            --field video_format=standard

  # ── Comment auto-responder (runs every hour independently) ──────────────────
  comment-responder:
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests

      - name: Reply to comments
        continue-on-error: true
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          mkdir -p pipeline/logs
          python -c "
          import sys, logging
          logging.basicConfig(level=logging.INFO, format='%(levelname)s: %(message)s')
          sys.path.insert(0, 'pipeline/scripts')
          from comment_responder import run_comment_responder
          run_comment_responder()
          "

      - name: Save replied comments log and auto-fixes
        continue-on-error: true
        run: |
          git config user.name  "VisionaryMinds Bot"
          git config user.email "bot@visionaryminds.com"
          git add pipeline/logs/replied_comments.json \
                  pipeline/logs/auto_fixes.json \
                  pipeline/logs/script_feedback.json 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "bot: update comments + auto-fixes [skip ci]"
          git push 2>/dev/null || true

  # ── Analytics refresh (runs only on the 12:00 UTC job) ───────────────────────
  analytics-refresh:
    runs-on: ubuntu-latest
    needs: news-video
    if: |
      always() &&
      (
        github.event.schedule == '0 13 * * *' ||
        github.event_name == 'workflow_dispatch'
      )

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests

      - name: Fetch YouTube Analytics
        continue-on-error: true
        env:
          GROQ_API_KEY_1:        ${{ secrets.GROQ_API_KEY_1 }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID_READ }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_READ }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN_READ }}
        run: |
          python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, 'pipeline/scripts')
          from news_analytics import fetch_analytics_feedback, fetch_peak_hours, update_velocity_queue, apply_adaptive_learning, auto_improve_low_ctr
          logs = Path('pipeline/logs')
          hints = fetch_analytics_feedback(logs)
          print('Feedback hints:', hints)
          if hints.get('retention_signal'):
              apply_adaptive_learning(hints, logs)
              print('Adaptive learning applied:', hints.get('retention_signal'))
          fetch_peak_hours(logs)
          update_velocity_queue(logs)
          auto_improve_low_ctr(logs)
          print('CTR improvement check complete')
          "

      - name: Save analytics data
        continue-on-error: true
        run: |
          git config user.name  "VisionaryMinds Bot"
          git config user.email "bot@visionaryminds.com"
          git add pipeline/logs/analytics_data.json \
                  pipeline/logs/video_results.json 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "bot: update analytics data [skip ci]"
          git push 2>/dev/null || true
